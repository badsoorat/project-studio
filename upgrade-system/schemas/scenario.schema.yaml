# JSONSchema (in YAML) for scenario frontmatter.
# Consumed by: upgrade-system/evals/tiers/T3-behavioral/validate_scenarios.py
# Stage: F1 stub. F3 finalizes.

$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://project-studio.local/schemas/scenario.schema.yaml"
title: "Behavioral scenario"
type: object
required:
  - id
  - atom_id
  - tier
  - author
  - expected_state_at_commit
  - steps
  - expected_outcome
properties:
  id:
    type: string
    pattern: "^scn-[0-9]{4}-[a-z0-9-]+$"
  atom_id:
    type: string
    pattern: "^atom-[0-9]{3}-[a-z0-9-]+$"
  tier:
    type: string
    enum: [T3-behavioral, T4-integration, T5-compat]
  author:
    type: string
    enum: [scenario-agent]            # implementation-agent MUST NOT author scenarios
  expected_state_at_commit:
    type: string
    enum: [red, green]                # scenarios land red; go green after implementation
    default: red
  steps:
    type: array
    minItems: 1
    items:
      type: object
      required: [action, expect]
      properties:
        action: { type: string }
        expect: { type: string }
  expected_outcome:
    type: string
  fixtures:
    type: array
    items:
      type: string                    # paths under upgrade-system/fixtures/
